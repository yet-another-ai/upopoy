---
openapi: 3.0.1
info:
  title: Upopoy API
  version: v1
  description: HTTP JSON API for Upopoy.
servers:
- url: http://localhost:3001
  description: Local development
components:
  securitySchemes:
    bearer_auth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    auth_settings:
      type: object
      properties:
        registration_enabled:
          type: boolean
        email_login_enabled:
          type: boolean
      required:
      - registration_enabled
      - email_login_enabled
    auth_provider:
      type: object
      properties:
        name:
          type: string
        label:
          type: string
        authorize_path:
          type: string
      required:
      - name
      - label
      - authorize_path
    user:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        skills:
          type: array
          items:
            "$ref": "#/components/schemas/profile_skill"
        system_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - email
      - display_name
      - title
      - bio
      - skills
      - system_admin
      - created_at
      - updated_at
    profile_skill:
      type: object
      properties:
        name:
          type: string
        level:
          type: string
          enum:
          - learning
          - working
          - advanced
          - expert
        note:
          type: string
      required:
      - name
      - level
      - note
    user_response:
      type: object
      properties:
        user:
          "$ref": "#/components/schemas/user"
      required:
      - user
    credentials:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              format: password
          required:
          - email
          - password
      required:
      - user
    signup_request:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            password:
              type: string
              format: password
            password_confirmation:
              type: string
              format: password
          required:
          - email
          - password
          - password_confirmation
      required:
      - user
    error:
      type: object
      properties:
        error:
          type: string
        errors:
          type: object
    admin_settings:
      type: object
      properties:
        registration_enabled:
          type: boolean
        email_login_enabled:
          type: boolean
        updated_at:
          type: string
          format: date-time
      required:
      - registration_enabled
      - email_login_enabled
      - updated_at
    admin_settings_request:
      type: object
      properties:
        settings:
          type: object
          properties:
            registration_enabled:
              type: boolean
            email_login_enabled:
              type: boolean
      required:
      - settings
    managed_user:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
          format: email
        display_name:
          type: string
          nullable: true
        title:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        skills:
          type: array
          items:
            "$ref": "#/components/schemas/profile_skill"
        system_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        group_ids:
          type: array
          items:
            type: integer
        groups_count:
          type: integer
      required:
      - id
      - email
      - display_name
      - title
      - bio
      - skills
      - system_admin
      - created_at
      - updated_at
      - group_ids
      - groups_count
    users_index:
      type: object
      properties:
        users:
          type: array
          items:
            "$ref": "#/components/schemas/managed_user"
        meta:
          "$ref": "#/components/schemas/pagination_meta"
      required:
      - users
      - meta
    user_update_request:
      type: object
      properties:
        user:
          type: object
          properties:
            email:
              type: string
              format: email
            display_name:
              type: string
            title:
              type: string
            bio:
              type: string
            skills:
              type: array
              items:
                "$ref": "#/components/schemas/profile_skill"
            system_admin:
              type: boolean
      required:
      - user
    pagination_meta:
      type: object
      properties:
        current_page:
          type: integer
        total_pages:
          type: integer
        total_count:
          type: integer
        per_page:
          type: integer
      required:
      - current_page
      - total_pages
      - total_count
      - per_page
    group:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        parent_group_id:
          type: integer
          nullable: true
        parent_group_name:
          type: string
          nullable: true
        user_ids:
          type: array
          items:
            type: integer
        users_count:
          type: integer
        admin_user_ids:
          type: array
          items:
            type: integer
        admins_count:
          type: integer
        can_admin:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - name
      - description
      - parent_group_id
      - parent_group_name
      - user_ids
      - users_count
      - admin_user_ids
      - admins_count
      - can_admin
      - created_at
      - updated_at
    group_request:
      type: object
      properties:
        group:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            parent_group_id:
              type: integer
              nullable: true
            user_ids:
              type: array
              items:
                type: integer
            admin_user_ids:
              type: array
              items:
                type: integer
      required:
      - group
    project:
      type: object
      properties:
        id:
          type: integer
        group_id:
          type: integer
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        group_name:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - group_id
      - name
      - description
      - group_name
      - created_at
      - updated_at
    project_request:
      type: object
      properties:
        project:
          type: object
          properties:
            name:
              type: string
            description:
              type: string
            group_id:
              type: integer
              nullable: true
      required:
      - project
    drive_item:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        parent_id:
          type: integer
          nullable: true
        kind:
          type: string
          enum:
          - folder
          - file
        name:
          type: string
        text_content_cache:
          type: string
        markdown:
          type: boolean
        content_type:
          type: string
          nullable: true
        byte_size:
          type: integer
          nullable: true
        download_path:
          type: string
          nullable: true
        deleted_at:
          type: string
          format: date-time
          nullable: true
        versions_count:
          type: integer
        latest_version_number:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - project_id
      - parent_id
      - kind
      - name
      - text_content_cache
      - markdown
      - content_type
      - byte_size
      - download_path
      - deleted_at
      - versions_count
      - latest_version_number
      - created_at
      - updated_at
    drive_item_version:
      type: object
      properties:
        id:
          type: integer
        drive_item_id:
          type: integer
        version_number:
          type: integer
        name:
          type: string
        content_type:
          type: string
          nullable: true
        byte_size:
          type: integer
          nullable: true
        text_content_cache:
          type: string
        markdown:
          type: boolean
        download_path:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - drive_item_id
      - version_number
      - name
      - content_type
      - byte_size
      - text_content_cache
      - markdown
      - download_path
      - created_at
      - updated_at
    drive_item_request:
      type: object
      properties:
        drive_item:
          type: object
          properties:
            kind:
              type: string
              enum:
              - folder
              - file
            name:
              type: string
            parent_id:
              type: integer
              nullable: true
            content:
              type: string
            base_version_number:
              type: integer
              nullable: true
      required:
      - drive_item
    drive_item_upload_request:
      type: object
      properties:
        drive_item:
          type: object
          properties:
            kind:
              type: string
              enum:
              - file
            name:
              type: string
            parent_id:
              type: integer
              nullable: true
            file:
              type: string
              format: binary
            base_version_number:
              type: integer
              nullable: true
      required:
      - drive_item
    drive_item_content:
      type: object
      properties:
        content:
          type: string
      required:
      - content
    iteration:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        name:
          type: string
        starts_at:
          type: string
          format: date-time
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        inbox:
          type: boolean
        task_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - project_id
      - name
      - starts_at
      - deadline
      - inbox
      - task_count
      - created_at
      - updated_at
    iteration_request:
      type: object
      properties:
        iteration:
          type: object
          properties:
            name:
              type: string
            starts_at:
              type: string
              format: date-time
            deadline:
              type: string
              format: date-time
      required:
      - iteration
    task:
      type: object
      properties:
        id:
          type: integer
        project_id:
          type: integer
        iteration_id:
          type: integer
          nullable: true
        status:
          type: string
          enum:
          - todo
          - in_progress
          - under_review
          - done
        priority:
          type: string
          enum:
          - low
          - medium
          - high
        title:
          type: string
        description:
          type: string
          nullable: true
        estimated_minutes:
          type: integer
          nullable: true
        position:
          type: integer
        iteration_name:
          type: string
          nullable: true
        iteration_starts_at:
          type: string
          format: date-time
          nullable: true
        iteration_deadline:
          type: string
          format: date-time
          nullable: true
        iteration_inbox:
          type: boolean
          nullable: true
        deadline:
          type: string
          format: date-time
          nullable: true
        developer_ids:
          type: array
          items:
            type: integer
        developers:
          type: array
          items:
            "$ref": "#/components/schemas/user"
        reviewer_ids:
          type: array
          items:
            type: integer
        reviewers:
          type: array
          items:
            "$ref": "#/components/schemas/user"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      required:
      - id
      - project_id
      - iteration_id
      - status
      - priority
      - title
      - description
      - estimated_minutes
      - position
      - iteration_name
      - iteration_starts_at
      - iteration_deadline
      - iteration_inbox
      - deadline
      - developer_ids
      - developers
      - reviewer_ids
      - reviewers
      - created_at
      - updated_at
    task_request:
      type: object
      properties:
        task:
          type: object
          properties:
            status:
              type: string
              enum:
              - todo
              - in_progress
              - under_review
              - done
            priority:
              type: string
              enum:
              - low
              - medium
              - high
            title:
              type: string
            description:
              type: string
            deadline:
              type: string
              format: date-time
              nullable: true
            estimated_minutes:
              type: integer
              nullable: true
            iteration_id:
              type: integer
              nullable: true
            position:
              type: integer
            developer_ids:
              type: array
              items:
                type: integer
            reviewer_ids:
              type: array
              items:
                type: integer
      required:
      - task
    board:
      type: object
      properties:
        project:
          "$ref": "#/components/schemas/project"
        iterations:
          type: array
          items:
            "$ref": "#/components/schemas/iteration"
        inbox_iteration:
          "$ref": "#/components/schemas/iteration"
        statuses:
          type: array
          items:
            "$ref": "#/components/schemas/board_status"
      required:
      - project
      - iterations
      - inbox_iteration
      - statuses
    board_status:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        slug:
          type: string
        position:
          type: integer
        tasks:
          type: array
          items:
            "$ref": "#/components/schemas/task"
      required:
      - id
      - name
      - slug
      - position
      - tasks
    search_result:
      type: object
      properties:
        slug:
          type: string
        type:
          type: string
        id:
          type: integer
        title:
          type: string
        snippet:
          type: string
        api_path:
          type: string
        metadata:
          type: object
        updated_at:
          type: string
          format: date-time
          nullable: true
      required:
      - slug
      - type
      - id
      - title
      - snippet
      - api_path
      - metadata
      - updated_at
    search_response:
      type: object
      properties:
        results:
          type: array
          items:
            "$ref": "#/components/schemas/search_result"
      required:
      - results
paths:
  "/api/v1/admin/settings":
    get:
      summary: Returns application settings
      tags:
      - Admin settings
      security:
      - bearer_auth: []
      responses:
        '200':
          description: settings returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/admin_settings"
    patch:
      summary: Updates application settings
      tags:
      - Admin settings
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: settings updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/admin_settings"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/admin_settings_request"
    put:
      summary: Replaces application settings
      tags:
      - Admin settings
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: settings updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/admin_settings"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/admin_settings_request"
  "/api/v1/auth/settings":
    get:
      summary: Returns public authentication settings
      tags:
      - Authentication
      responses:
        '200':
          description: settings returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/auth_settings"
  "/api/v1/auth/providers":
    get:
      summary: Lists configured OAuth providers
      tags:
      - Authentication
      responses:
        '200':
          description: providers returned
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/auth_provider"
  "/api/v1/auth/signup":
    post:
      summary: Creates a user account
      tags:
      - Authentication
      parameters: []
      responses:
        '201':
          description: user created
          headers:
            Authorization:
              schema:
                type: string
              description: Bearer JWT
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/user_response"
        '422':
          description: validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/signup_request"
  "/api/v1/auth/login":
    post:
      summary: Authenticates with email and password
      tags:
      - Authentication
      parameters: []
      responses:
        '200':
          description: signed in
          headers:
            Authorization:
              schema:
                type: string
              description: Bearer JWT
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/user_response"
        '401':
          description: invalid credentials
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/credentials"
  "/api/v1/auth/me":
    get:
      summary: Returns the current user
      tags:
      - Authentication
      security:
      - bearer_auth: []
      responses:
        '200':
          description: current user returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/user_response"
        '401':
          description: authentication required
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error"
  "/api/v1/auth/logout":
    delete:
      summary: Revokes the current JWT
      tags:
      - Authentication
      security:
      - bearer_auth: []
      responses:
        '200':
          description: signed out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                required:
                - message
  "/api/v1/projects/{project_id}/drive_items":
    parameters:
    - name: project_id
      in: path
      required: true
      schema:
        type: integer
    - name: parent_id
      in: query
      required: false
      nullable: true
      schema:
        type: integer
    get:
      summary: Lists project drive items
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '200':
          description: drive items returned
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/drive_item"
    post:
      summary: Creates a drive item
      tags:
      - Drive
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '201':
          description: drive item created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item"
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - "$ref": "#/components/schemas/drive_item_request"
              - "$ref": "#/components/schemas/drive_item_upload_request"
          multipart/form-data:
            schema:
              oneOf:
              - "$ref": "#/components/schemas/drive_item_request"
              - "$ref": "#/components/schemas/drive_item_upload_request"
  "/api/v1/drive_items/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Returns a drive item
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '200':
          description: drive item returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item"
    patch:
      summary: Updates a drive item
      tags:
      - Drive
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: drive item updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/drive_item_request"
    delete:
      summary: Deletes a drive item
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '204':
          description: drive item deleted
  "/api/v1/drive_items/{id}/file":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    patch:
      summary: Uploads a new file version
      tags:
      - Drive
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: file version uploaded
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item"
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: file
  "/api/v1/drive_items/{id}/content":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Returns markdown content
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '200':
          description: markdown content returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item_content"
    patch:
      summary: Updates markdown content
      tags:
      - Drive
      security:
      - bearer_auth: []
      parameters: []
      responses:
        '200':
          description: markdown content updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item_content"
      requestBody:
        content:
          application/json:
            schema:
              "$ref": "#/components/schemas/drive_item_request"
  "/api/v1/drive_items/{id}/versions":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Lists drive item versions
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '200':
          description: drive item versions returned
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/drive_item_version"
  "/api/v1/drive_items/{id}/download":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Downloads a file
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '302':
          description: redirected to blob
  "/api/v1/drive_item_versions/{id}/content":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      summary: Returns version markdown content
      tags:
      - Drive
      security:
      - bearer_auth: []
      responses:
        '200':
          description: version markdown content returned
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/drive_item_content"
  "/api/v1/drive_item_versions/{id}/download":
    parameters:
    - name: id
      in: path
      required: true
      schema:
