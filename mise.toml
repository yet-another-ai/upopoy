[tools]
"github:microsoft/apm" = "latest"
ruby = "4"
node = "24"
pnpm = "latest"

[settings]
experimental = true

[tasks.backend]
description = "Run the Rails API server with Falcon"
dir = "backend"
run = "bundle exec falcon serve --bind http://127.0.0.1:3001 --config config.ru --threaded --count 1"

[tasks.frontend]
description = "Run the Vite frontend"
run = "pnpm --filter frontend dev --host 0.0.0.0"

[tasks.dev]
description = "Run backend and frontend together with Falcon host"
run = "cd backend && bundle exec falcon host ../falcon.rb"

[tasks.test]
description = "Run backend, OpenAPI, frontend unit, and frontend integration tests"
run = [
  "cd backend && bundle exec rspec",
  "cd backend && ruby -S rake openapi:check",
  "pnpm --filter frontend test",
]

[tasks.lint]
description = "Run backend and frontend linters"
run = [
  "cd backend && bundle exec rubocop",
  "pnpm --filter frontend lint && pnpm --filter frontend format:check",
]

[tasks.format]
description = "Auto-format backend and frontend code"
run = [
  "cd backend && bundle exec rubocop -A",
  "pnpm --filter frontend format",
]

[tasks.backend-test]
description = "Run backend RSpec tests"
dir = "backend"
run = "bundle exec rspec"

[tasks.backend-openapi-check]
description = "Verify generated OpenAPI documentation is up to date"
dir = "backend"
run = "ruby -S rake openapi:check"

[tasks.backend-lint]
description = "Run backend RuboCop"
dir = "backend"
run = "bundle exec rubocop"

[tasks.frontend-test]
description = "Run frontend type checks, unit tests, and Playwright tests"
run = "pnpm --filter frontend test"

[tasks.frontend-lint]
description = "Run frontend ESLint and Prettier checks"
run = "pnpm --filter frontend lint && pnpm --filter frontend format:check"
